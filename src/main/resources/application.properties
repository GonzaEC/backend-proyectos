spring.application.name=service-projects

# Base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/service_projects}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=service-projects
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT (misma clave que service-users)
jwt.secret=${JWT_SECRET:dev-secret-key-must-be-at-least-256-bits-long-for-hs256}

# AWS S3
aws.access-key-id=${AWS_ACCESS_KEY_ID:minioadmin}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:minioadmin}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${S3_BUCKET_NAME:sip-project-documents}
aws.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}

# Server
server.port=${PORT:8081}

# CORS
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
